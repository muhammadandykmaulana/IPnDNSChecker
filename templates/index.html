<!DOCTYPE html>
<html lang="id">
<head>
    <!-- [SOAL 2c] Tampilan tersusun rapi menggunakan framework CSS (Tailwind) -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Threat Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

    <!-- [SOAL 2b] Menampilkan Judul/Nama Data -->
    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <div class="text-center mb-8">
            <i class="fa-solid fa-shield-halved text-5xl text-cyan-500 mb-4"></i>
            <h1 class="text-2xl font-bold">Cyber Threat Analyzer</h1>
            <p class="text-slate-400 text-sm mt-2">Cek Reputasi Keamanan IP atau Domain</p>
        </div>

        <!-- Menampilkan pesan error dari backend jika ada masalah (IP salah format, dsb) -->
        {% if error %}
            <div class="bg-red-500/20 border border-red-500 text-red-400 p-3 rounded-lg mb-6 text-sm text-center">
                {{ error }}
            </div>
        {% endif %}

        <form action="/" method="POST" class="space-y-6">
            <!-- [SOAL 3b] Pencarian Sederhana berdasarkan kategori API -->
            <div class="flex gap-4 p-1 bg-slate-900 rounded-lg">
                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="target_type" value="ip" checked class="peer sr-only" onchange="updatePlaceholder('ip')">
                    <div class="text-center py-2 rounded-md peer-checked:bg-cyan-600 transition font-semibold text-sm text-slate-400 peer-checked:text-white">
                        <i class="fa-solid fa-network-wired mr-2"></i>IP Address
                    </div>
                </label>
                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="target_type" value="domain" class="peer sr-only" onchange="updatePlaceholder('domain')">
                    <div class="text-center py-2 rounded-md peer-checked:bg-cyan-600 transition font-semibold text-sm text-slate-400 peer-checked:text-white">
                        <i class="fa-solid fa-globe mr-2"></i>Domain URL
                    </div>
                </label>
            </div>

            <div>
                <input type="text" name="target" id="targetInput" required 
                       class="w-full bg-slate-900 border border-slate-600 p-4 rounded-lg focus:outline-none focus:border-cyan-500 transition"
                       placeholder="Masukkan Alamat IP (misal: 8.8.8.8)">
            </div>

            <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 py-3 rounded-lg font-bold transition shadow-[0_0_15px_rgba(8,145,178,0.5)]">
                <i class="fa-solid fa-magnifying-glass mr-2"></i> Analisis Target
            </button>
        </form>
    </div>

    <script>
        function updatePlaceholder(type) {
            const input = document.getElementById('targetInput');
            if (type === 'ip') {
                input.placeholder = "Masukkan Alamat IP (misal: 8.8.8.8)";
            } else {
                input.placeholder = "Masukkan Nama Domain (misal: google.com)";
            }
        }
    </script>
</body>
</html>
