<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Threat Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Tugas Kelompok 1 - ITTS</div>
        <ul class="nav-links">
            <li><a href="/">Beranda Utama</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1 class="page-title">🛡️ Cyber Threat Analyzer</h1>
        <p class="description">
            Periksa reputasi Alamat IP atau Domain untuk mendeteksi ancaman seperti Malware, Phishing, dan Spam.
        </p>
        
        {% if error %}
            <div class="alert error">{{ error }}</div>
        {% endif %}

        <div class="card form-card">
            <form method="POST">
                <div class="radio-group" style="margin-bottom: 20px; text-align: left;">
                    <label style="margin-right: 15px; cursor: pointer;">
                        <input type="radio" name="search_type" value="ip" checked> IP Address (AbuseIPDB)
                    </label>
                    <label style="cursor: pointer;">
                        <input type="radio" name="search_type" value="domain"> Domain URL (VirusTotal)
                    </label>
                </div>

                <input type="text" name="target_input" placeholder="Masukkan IP (misal: 8.8.8.8) atau Domain (misal: google.com)" required>
                <button type="submit" class="btn">Mulai Pindai</button>
            </form>
        </div>
    </div>
</body>
</html>
